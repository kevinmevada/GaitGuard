# Local development overrides (use with: python run_local.py --use-local-config)

paths:
  raw_data: "data/raw_local"
  processed_data: "data/processed"
  features: "data/features"
  results: "results"

ingestion:
  daphnet:
    enabled: false

preprocessing:
  min_trial_length_s: 1.0

discovery:
  sources: ["voisard"]

validation:
  fail_on_error: false
