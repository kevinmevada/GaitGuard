# configs/pipeline_config.yaml
# Master configuration for the pathology-tier gait screening pipeline

# Reproducibility (applied at pipeline entry via main.py → set_global_seed)
reproducibility:
  seed: 42
  deterministic_torch: true   # cudnn deterministic mode when PyTorch/CUDA is used

# Compute — shared by all PyTorch stages (phase3, train_deep, anomaly, evaluators)
compute:
  device: "cuda"                 # "auto" | "cuda" | "cpu" — ROCKET/sklearn remain CPU

# Paths
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  features: "data/features"
  results: "results"
  figures_eda: "results/figures/eda"      # EDA plots (single output; no duplicate graphs/)
  figures_models: "results/figures/models"
  figures_shap: "results/figures/shap"
  metrics: "results/metrics"
  checkpoints: "results/checkpoints"
  logs: "logs"

# Stage 0 — multi-source dataset discovery (Voisard + DAPHNET)
discovery:
  sources: ["voisard", "daphnet"]
  inventory_path: "data/processed/dataset_inventory.csv"

# Stage 1 — raw data QC (stops pipeline on failure when fail_on_error: true)
validation:
  inventory_path: "data/processed/dataset_inventory.csv"
  report_path: "data/processed/quality_report.csv"
  fail_on_error: false   # 28 Figshare trials exceed length tolerance; logged in quality_report.csv
  voisard:
    max_nan_fraction: 0.0
    max_packet_gap: 30          # monotonic + bounded wireless dropout
    max_length_diff_rows: 25
    max_length_diff_fraction: 0.02
  daphnet:
    max_timestamp_gap_ms: 50.0

# Stage 2 — Voisard .txt parsing (ingest)
ingestion:
  convert_gyro_to_rad: true       # gyr_rad = gyr_deg * (pi/180) at parse time
  packet_gap_strategy: interpolate  # interpolate | truncate at first large gap
  max_interpolate_gap: 10         # packets; larger gaps → truncate segment
  daphnet:
    enabled: true
    drop_annotation_zero: true
    source_fs_hz: 64
    target_fs_hz: 100
    resample_up: 25               # resample_poly(up, down) → 64 * 25/16 = 100 Hz
    resample_down: 16
    psd_verification:
      enabled: true
      min_subjects: 2             # plot trunk-Z PSD for ≥2 subjects (supplemental figs)
      band_hz: [3.0, 8.0]         # freezing-index numerator band
      max_peak_shift_hz: 0.5      # abort ingest if peak shifts more than this
      figure_dir: "results/figs"  # writes psd_check_S01.png, …
    # Design decision (not preprocessing): trunk → lower_back only; ankle/thigh dropped
    sensor_mapping:
      trunk_to: lower_back
      dropped: [ankle, thigh]
      eval_mode: single_sensor_zero_shot_lb
    sealed_fog_eval:
      enabled: true
      allow_rerun: false   # sealed test — delete daphnet_fog_auroc.json to re-run
      # labels_path: data/processed/daphnet/fog_labels.npz  # default

# Dataset
dataset:
  sensor_positions: ["head", "lower_back", "left_foot", "right_foot"]
  sampling_rate: 100
  axes: ["acc_x", "acc_y", "acc_z", "gyr_x", "gyr_y", "gyr_z", "mag_x", "mag_y", "mag_z"]

  cohort_labels:
    Healthy: 0
    HipOA: 1
    KneeOA: 1
    ACL: 1
    PD: 2
    CVA: 2
    CIPN: 2
    RIL: 2

  # Primary training target: 3-class pathology tiers (see docs/label_binning.md).
  label_mode: "multiclass"
  # Binary sensitivity only (label_mode: binary): high-risk if multiclass tier >= threshold.
  # Primary binary rule (MED-002): neurological-only high risk (multiclass tier >= 2).
  high_risk_threshold: 2
  binary_strategy: "threshold_ge_2"
  # Sensitivity analysis only — threshold_ge_1 / high_risk_threshold: 1 merges PD (67.3%)
  # with HipOA (28.5%) fall probability; do NOT report as 'fall risk prediction'.
  report_class_distribution: true

  laterality_flags:
    HipOA: "right_dominant"
    CVA: "right_dominant"

  # Subject-grouped holdout (trials keyed by participant_id — no trial-level leakage).
  # Healthy: 70% train / 15% val / 15% test; all pathological participants → test only.
  subject_split:
    healthy_train_fraction: 0.70
    healthy_val_fraction: 0.15
    healthy_test_fraction: 0.15
    random_state: 42   # keep equal to reproducibility.seed

# Preprocessing (Stage C: Voisard + DAPHNET merge @ 100 Hz)
preprocessing:
  # Unified accelerometer bandpass — identical on both datasets (zero-phase filtfilt)
  unified_acc_bandpass:
    enabled: true
    low_hz: 0.5
    high_hz: 20.0
    order: 4
  lowpass_cutoff_hz: 20.0       # gyro low-pass upper edge (matches unified high_hz)
  lowpass_order: 4
  highpass_cutoff_hz: 0.5       # legacy alias (matches unified low_hz)
  madgwick_enabled: true
  madgwick_beta: 0.1
  madgwick_sensors: ["head", "lower_back"]
  gyro_in_degrees: false         # Voisard txt converted at ingest; set true only for legacy deg/s CSV
  madgwick_use_magnetometer: false
  min_trial_length_s: 10.0
  gait_event_source: "algorithm"   # algorithm | dataset (use Figshare HS when validated)
  heel_strike_threshold_mode: prominence  # prominence (trial-adaptive) | percentile (legacy height)
  heel_strike_peak_percentile: 85  # prominence percentile in prominence mode; height percentile in percentile mode
  heel_strike_peak_percentile_by_cohort: {}  # optional per-cohort overrides, e.g. PD: 75
  heel_strike_prominence_floor: null  # optional absolute prominence floor (m/s²) after percentile filter
  heel_strike_min_interval_s: 0.5  # min spacing between strikes (was 0.3 s @ 100 Hz)
  max_nan_fraction_before_filter: 0.05  # LOW-002: discard trial sensors above this NaN rate
  exclude_uturn_segment: true          # drop annotated U-turn; keep outward+return walking only
  min_walking_segment_s: 5.0             # each bout must be >= 5 s (500 samples @ 100 Hz)

  gait_event_validation:
    tolerance_ms: 50               # ± window for TP matching vs ground-truth heel strikes
    tune_cohort_percentiles: false # grid-search percentile per cohort; writes gait_event_cohort_thresholds.json
    tune_percentile_grid: [70, 75, 80, 85, 90, 95]

  # Run: python main.py --stage validate_gait_events  (requires raw_data with annotations)

# Feature Engineering
features:
  # Phase 1 spatiotemporal + variability (Moon 2020, Trabassi 2022, Voisard)
  phase1_spatiotemporal:
    enabled: true
    rolling_cv_window_strides: 5
    enable_spatial_integration: true
    min_strides: 3
    integration_axis: acc_resultant   # acc_x for AP-forward if sensor-aligned

  # Phase 2 kinematic, kinetic & frequency (Trabassi, Sadeghsalehi, Brognara)
  phase2_kinematic_frequency:
    enabled: true
    rms_window_s: 2.0
    joint_gyro_axis: gyr_y
    harmonic_max_order: 6
    freezing_index:
      locomotion_band_hz: [0.5, 3.0]
      freezing_band_hz: [3.0, 8.0]
      sample_window_s: 2.0   # short-time PSD for DAPHNET sample-level detector

  phase2_kinematic:
    - peak_gyro_deg_s
    - rms_acc_2s_mean
    - rms_acc_2s_std
    - harmonic_ratio_ap
    - harmonic_ratio_ml
    - harmonic_ratio_v
    - freezing_index
    - hip_angle_rom_deg
    - knee_angle_rom_deg
    - ankle_angle_rom_deg

  # Phase 3 deep representations (BiLSTM-AE, ROCKET, MINIROCKET, InceptionTime maps)
  phase3_deep:
    enabled: true
    force_retrain: false
    max_fit_windows: 50000
    bilstm_autoencoder:
      enabled: true
      hidden_size: 128
      latent_dim: 64
      latent_export_dims: 16      # h_t coordinates exported per trial
      max_epochs: 40
      batch_size: 64
      learning_rate: 0.001
      early_stopping_patience: 8
    rocket:
      enabled: true
      n_kernels: 10000
      export_dims: 128            # prefix rk_f00000… for parquet; full kernel bank in checkpoint
    minirocket:
      enabled: true
      n_kernels: 10000
      export_dims: 128            # deterministic {-1,2} weights; prefix mr_f…
    inception_multiscale:
      enabled: true
    run_baseline_eval: false   # set true to write phase3_rocket_baselines.json

  phase3_deep_features:
    - ae_latent_h00_mean
    - ae_recon_mse_total
    - ae_lb_recon_error
    - rk_max_mean
    - rk_ppv_mean
    - mr_max_mean
    - mr_ppv_mean
    - it_ms10_00

  temporal:
    # Canonical Phase 1 names (trial-level; per-side columns prefixed left_/right_)
    - stride_duration_s
    - stride_duration_std
    - step_duration_s
    - stance_pct
    - swing_pct
    - stride_duration_cv_pct
    - stride_duration_rolling_cv_pct
    - step_duration_cv_pct
    - step_duration_rolling_cv_pct
    - cadence_spm
    - step_count
    # Legacy aliases (still emitted for backward-compatible ablations)
    - stride_time_mean
    - stride_time_std
    - stride_time_cv
    - cadence
    - stance_phase_ratio
    - swing_phase_ratio
    - double_support_ratio

  # Swing-phase double integration + drift correction (LF/RF only; DAPHNET LB-only → NaN)
  spatial:
    - step_length_m
    - stride_length_m
    - gait_velocity_m_s

  spectral:
    - dominant_frequency
    - spectral_centroid
    - spectral_entropy
    - power_0_1hz
    - power_1_3hz
    - power_3_10hz
    - harmonic_ratio

  wavelet:
    - wavelet_energy_a4             # DWT approximation band energy (0–3.125 Hz)
    - wavelet_energy_d1             # DWT detail band energy (25–50 Hz)
    - wavelet_energy_d2             # DWT detail band energy (12.5–25 Hz)
    - wavelet_energy_d3             # DWT detail band energy (6.25–12.5 Hz)
    - wavelet_energy_d4             # DWT detail band energy (3.125–6.25 Hz)
    - wavelet_ratio_a4              # energy ratio per sub-band
    - wavelet_ratio_d1
    - wavelet_ratio_d2
    - wavelet_ratio_d3
    - wavelet_ratio_d4
    - wavelet_entropy               # Shannon entropy of sub-band energy distribution

  trunk_dynamics:
    - rms_acc_ap
    - rms_acc_ml
    - rms_acc_v
    - rms_acc_total
    - jerk_mean
    - jerk_max
    - lyapunov
    - apen
    - sampen                      # Sample entropy (Richman & Moorman 2000) — more robust than ApEn
    - dfa                         # DFA alpha: long-range stride correlations (Hausdorff 1995/2001)
    - head_lb_rms_ratio           # head/LB postural transmission coefficient
    - head_lb_lyapunov_ratio      # head/LB dynamic stability ratio
    - head_lb_dfa_ratio           # head/LB long-range correlation ratio

  orientation:
    - tilt_mean_deg
    - tilt_std_deg
    - tilt_range_deg
    - pitch_std_deg
    - roll_std_deg
    - postural_sway_vel

  asymmetry:
    - si_stride_duration
    - si_stance_pct
    - si_swing_pct
    - si_step_length
    - si_gait_velocity
    - si_stride_duration_cv_pct
    - si_rms_acc
    - stride_time_mean_asymmetry
    - stride_time_std_asymmetry
    - asymmetry_rms_acc

  turning:
    - turn_duration_mean
    - turn_velocity_mean
    - turn_velocity_peak
    - turn_jerk_mean

  # Patient-level stats across within-session trials (ordered by session, trial_id)
  patient_aggregation:
    include_mean: true
    include_std: true
    include_range: true    # max - min across trials (intra-session variability)
    include_trend: true    # linear slope vs trial order (fatigue / adaptation)
    trial_order: ["session", "trial_id"]
    min_trials_for_trend: 2

  # Nonlinear dynamics on acc_resultant (validated on synthetic signals; see tests)
  lyapunov:
    use_nolds: true
    min_length: 200
    max_lag: 50
    min_embedding_dim: 2
    max_embedding_dim: 10
    fnn_threshold: 0.10
    fnn_rtol: 10.0
    fnn_atol: 2.0
    max_anchors: 200
    validation_n_samples: 8000
    validation_fixed_embedding_dim: 3
    validation_fixed_lag: 2
    validation_sine_lyap_max: 0.02
    validation_chaotic_lyap_min: 0.05
    validation_chaotic_vs_sine_factor: 3.0

  approximate_entropy:
    order: 2
    metric: chebyshev
    tolerance: null          # null => 0.2 * std(signal)
    min_length: 200
    validation_noise_vs_sine_factor: 1.5

  # Sample entropy shares the same order/tolerance params as ApEn (same cfg dict passed in)
  # No extra block needed — uses approximate_entropy settings automatically.

  dfa:
    # Detrended Fluctuation Analysis (Hausdorff 1995; Peng 1994).
    # alpha ~1.0  → persistent long-range correlations (healthy gait)
    # alpha ~0.5  → uncorrelated random walk (Parkinson's, aging)
    # alpha ~1.5  → Brownian motion (over-smoothed / artifact)
    min_length: 200
    ransac: false            # true = RANSAC line fit (robust to outliers, slower)

# Feature selection (dimensionality control before final models)
# N=260 participants; patient matrix ≈ 4× trial features (mean/std/range/trend) — use RFECV cap ≤20.
# RFECV (Guyon 2002) + SHAP pruning cap p at ≤20; Lasso-style sparsity per Tibshirani 1996.
feature_selection:
  enabled: true
  nested_in_evaluation: true   # LOSO evaluator runs RFECV on each train fold only (ML-001)
  max_features: 20
  min_features: 5
  primary_method: "rfecv"   # rfecv | shap | intersection (exported as rfecv_capped when max_features < RFECV CV optimum)
  # RFECV RFE ranking: permutation (default) avoids Gini bias when p>>n; gini = legacy/debug only.
  rfecv_importance_method: permutation
  rfecv_permutation_n_repeats: 5
  # Force-keep nonlinear dynamics; rank by mean |SHAP| before cap (ML-040 / MED-005).
  # Sensitivity: re-run select_features + evaluate with required_feature_substrings: []
  # and compare LOSO AUC / SHAP to this default; see required_feature_shap_audit.csv.
  required_feature_substrings: ["sampen", "dfa"]
  max_required_features: 4    # cap forced nonlinear slots; raise only if SHAP audit shows gain
  nested_in_ablation: true   # LOSO ablations intersect per-fold RFECV mask (ML-025)
  compare_before_after: true
  cv_folds: 5
  # Global RFECV/compare_before_after parallelism (default: cpu_count - 1; not sklearn -1).
  # nested_n_jobs: 1 for per-LOSO-fold selection (avoid nested fork bombs).
  nested_n_jobs: 1

# Models (tabular only)
models:
  run:
    - xgboost
    - lightgbm
    - random_forest
    - svm
    - mlp

  tuning:
    enabled: true
    framework: "optuna"
    n_trials: 50
    timeout_per_model: 1200
    direction: "maximize"
    metric: "auc"
    cv_folds: 5

  evaluation:
    strategy: "nested_group_cv"
    # ML-032 / ANOM-001: primary manuscript endpoint.
    primary_endpoint: bilstm_ae_ensemble   # bilstm_ae_ensemble | anomaly_ensemble | deploy_ensemble | best_loso_nested
    report_deploy_loso_gap: true        # export deploy_loso_gap.csv + primary_endpoint.json
    random_state: 42   # keep equal to reproducibility.seed
    nested_n_trials: 10
    nested_timeout_per_model: 300
    leakage_comparison: true      # LOSO vs KFold split-protocol audit (ML-048; split_protocol_comparison.csv)
    leakage_kfold_splits: 10
    leakage_kfold_seed_repeats: 5  # MED-001: average ungrouped KFold AUC over seeds (stable inflation)
    leakage_kfold_seed_repeats_by_model:
      mlp: 5                       # explicit (matches global); non-convex / no early stopping
    # Paired AUC significance (DeLong + bootstrap MWU/Wilcoxon) for Table 1
    auc_pairwise_tests: true
    auc_reference_model: null   # null => highest-AUC model (usually ensemble)
    delong_bootstrap_n: 1000
    # Multiple comparison control across pairwise tests (fdr_bh | none)
    multiple_testing_correction: fdr_bh
    # Paired classification significance (McNemar on LOSO OOF predictions)
    mcnemar_tests: true
    mcnemar_reference_model: null   # null => same as auc_reference_model or highest accuracy
    mcnemar_exact: true             # exact binomial McNemar (valid for small discordant n; HIGH-004)
    # Classification threshold: Youden J fit on each LOSO train fold, applied to test fold
    threshold_strategy: train_fold_youden   # primary (unbiased)
    report_threshold_comparison: true       # also save 0.5 vs eval-Youden (optimistic) metrics
    auc_ci_bootstrap_n: 2000               # subject-level bootstrap for binary AUC CIs (MET-002)
    cohort_auc_min_n: 25                   # MED-003: suppress unstable cohort AUC below n=25 (ML-044)

  ensemble:
    enabled: true
    method: "soft_voting"          # primary deployable checkpoint → also saved as ensemble.pkl
    compare_methods: true          # nested LOSO: soft voting vs stacking meta-learner
    methods:
      - soft_voting
      - stacking
    top_k: 3
    stacking:
      meta_learner: logistic_regression
      cv_folds: 5                  # inner group-CV on LOSO train fold for meta features

# Deep Learning
deep_learning:
  enabled: true
  sequence_length: 200           # 2.0 s @ 100 Hz (trial-safe windowing; see preprocessing/windowing.py)
  overlap: 0.5                   # 50% overlap within trial only — never cross trial boundaries
  training_window_deduplication: true  # ML-043: train/val use one window per stride block per trial
  batch_size: 64
  mixed_precision: true          # AMP on CUDA for faster training/inference
  amp_dtype: "float16"           # "float16" (fastest) or "bfloat16" (more stable)
  max_epochs: 80
  learning_rate: 0.001
  early_stopping_patience: 12
  device: "cuda"                 # falls back to compute.device when unset; use "auto" for CPU fallback
  # ML-042: per-LOSO-fold lr search on inner participant val (aligned with tabular Optuna/fold)
  loso_hyperparameter_tuning:
    enabled: true                # HIGH-001: protocol-aligned vs tabular per-fold tuning (slower)
    n_trials: 5
    timeout_seconds: 120
    search_epochs: 12            # short budget for lr search only
    search_patience: 4
    lr_min_factor: 0.1             # search in [base_lr * min, base_lr * max]
    lr_max_factor: 10.0
  models:                        # architectures to evaluate in LOSO
    - inception_time             # Fawaz et al. 2020 — benchmark leader
    - deep_conv_lstm             # Ordóñez & Roggen 2016 — conv+LSTM vs BiLSTM-AE
    - gait_transformer           # Transformer encoder for sensor time series
    - tcn                        # Temporal Convolutional Network (Bai et al. 2018)
    - cnn1d                      # Residual 1-D CNN with channel attention
    - bilstm_attention           # Bidirectional LSTM + multi-head attention

# Unsupervised anomaly screening (ANOM-001 — tabular sklearn when primary_endpoint: anomaly_ensemble)
anomaly:
  loso_evaluation: true
  anomaly_threshold:
    policy: healthy_train_percentile
    percentile: 95.0
  methods:
    - isolation_forest
    - lof
    - one_class_svm
  ensemble_vote_threshold: 2   # API/deploy binary flag: ≥2 of 3 methods vote anomaly

# Primary model — BiLSTM-AE 3-method one-class ensemble (Healthy train only; 4-sensor HE+LB+LF+RF)
primary_model:
  bilstm_ae_ensemble:
    enabled: true
    ae_reconstruction_weight: 0.40
    isolation_forest_latent_weight: 0.33
    one_class_svm_latent_weight: 0.27
    max_windows_per_fold_fit: 30000
    anomaly_threshold:
      policy: healthy_train_percentile   # v13: train-fold healthy scores only
      percentile: 95.0                   # descriptive statistic, not val-tuned
    bilstm_autoencoder:
      hidden_size: 128
      latent_dim: 64
      max_epochs: 40
      batch_size: 64
      learning_rate: 0.001
      early_stopping_patience: 8

# Classical baselines — competitor paradigm 1 (Phase 1+2 handcrafted features)
classical_baselines:
  enabled: true
  export_oof_scores: true        # results/metrics/oof_scores/{model}.csv for CD/Wilcoxon
  evaluation_level: trial          # trial | patient
  models:
    - svm_rbf
    - random_forest
    - logistic_regression_l2
    - logistic_regression_l1
    - knn
  svm_rbf:
    C: 1.0
    gamma: scale
  random_forest:
    optuna_trials: 30
    smote_imbalance_ratio_min: 2.5
  logistic_regression:
    C: 1.0
    max_iter: 2000
  knn:
    n_neighbors: 5
    weights: distance

# DL baselines — competitor paradigm 2 (run in compute-cost order)
dl_baselines:
  enabled: true
  include_bilstm_ae: true        # append row from bilstm_ae_anomaly_metrics.csv
  max_fit_windows: 20000
  models:
    - minirocket
    - rocket
    - inception_time
    - deep_conv_lstm
  minirocket:
    n_kernels: 10000
  rocket:
    n_kernels: 10000
  ridge:
    alpha: 1.0
  deep:
    max_epochs: 40
    early_stopping_patience: 8
    loso_hyperparameter_tuning:
      enabled: false             # fixed LR for reproducible DL baseline sweep

# Core discriminative metrics — competitor matrix (F1w, MCC, AUROC, κ, …)
competitor_metrics:
  enabled: true
  mcc_abstract_lead_threshold: 0.7   # lead abstract with MCC if GaitGuard ≥ threshold

# Severity regression — Navita 2025 benchmark (MAE, MSE, R² on latent head)
severity_regression:
  enabled: true
  targets:
    - ordinal_severity          # HS=0, HipOA/KneeOA/ACL=1, PD/CVA/CIPN/RIL=2
    - fall_probability_pct      # cohort reference fall-risk % (continuous UPDRS proxy)
  cohort_scopes:
    - all_8                     # full 8-cohort ordinal severity (includes HS=0 anchor)
    - neuro_ortho               # pathology tiers only (excludes Healthy)
  navita_reference:
    mae: null                    # fill from Navita 2025 paper for beat comparison
    mse: null
    r2: null
    citation: "Navita et al. 2025 — AdaBoost/GB gait features → UPDRS"
  regression_head:
    hidden_dim: 32
    dropout: 0.1
    learning_rate: 0.001
    max_epochs: 80
    early_stopping_patience: 10
    batch_size: 64

# Statistical benchmark — Wilcoxon + Holm vs BiLSTM-AE, Critical Difference diagram
statistical_benchmark:
  enabled: true
  reference_model: bilstm_ae_ensemble
  alpha: 0.05
  # Auto-discover models from results/metrics/oof_scores/*.csv when null
  models: null

# Compute overhead — training & inference latency (single LOSO fold benchmark)
compute_overhead:
  enabled: true
  n_warmup: 1
  n_inference_repeats: 5
  skip_rf_tuning: true           # fixed RF params for reproducible timing
  max_fit_windows: 30000
  classical: true
  dl_rocket: true
  bilstm_ae: true
  benchmark_deep_models: false     # InceptionTime/DeepConvLSTM (slow; uses deep_max_epochs)
  deep_max_epochs: 5               # when benchmark_deep_models: true

# Section 2 novelty table — methodological firsts vs competitor literature
novelty_table:
  enabled: true
  sync_paper_docs: true            # writes docs/paper/table1_novelty_comparison.md

# Per-cohort LOSO — pathology-tier AUROC/F1 (do not average away clinical signal)
per_cohort_loso:
  enabled: true
  model: bilstm_ae_ensemble
  score_column: bilstm_ae_ensemble_score
  sync_paper_docs: true

# Clinical validation — Spearman ρ (fall probability vs BiLSTM-AE anomaly score)
fall_risk_spearman:
  enabled: true
  score_column: bilstm_ae_ensemble_score
  min_n: 3
  sync_paper_docs: true

# Feature ablation (LOSO AUC; run after train, ideally after evaluate for SHAP context)
ablation:
  reference_model: xgboost      # checkpoint re-fit per LOSO fold on each feature set
  top_k_shap: 10
  n_bootstrap: 1000

# BiLSTM-AE sensor ablation (4 vs 2 vs 1 sensor; DAPHNET transfer on 4-sensor row)
sensor_ablation:
  bilstm_ae:
    enabled: true
    # Optional faster AE budget for ablation sweeps (falls back to primary_model AE settings)
    bilstm_autoencoder:
      max_epochs: 25
      early_stopping_patience: 5

# Explainability
explainability:
  shap_enabled: true
  # loso_aggregate: SHAP on every LOSO held-out fold, concatenate for global importance
  # full_checkpoint: TreeExplainer on full-data checkpoint (background = training subsample)
  shap_strategy: loso_aggregate
  n_shap_samples: 260        # MED-008: cover all participants (N=260); cohort-stratified subsample if capped lower
  shap_background_samples: 100
  top_features_plot: 20

# Post-hoc calibration + split-conformal prediction sets (fit_uncertainty stage).
# Wraps existing OOF predictions from the 'evaluate' stage — does not retrain anything.
calibration:
  enabled: true
  model: null              # null => model with the most OOF rows
  conformal_alpha: 0.1      # target miscoverage rate (default: 90% coverage)

# Reporting
reporting:
  save_all_figures: true
  figure_dpi: 300
  figure_format: "pdf"
  ieee_table_format: true
