name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  PYTHONHASHSEED: "42"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]  # LOW-004: multi-version smoke (lockfile pins deps)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            fall_risk_pipeline/requirements-lock.txt
            fall_risk_pipeline/requirements-dev-lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fall_risk_pipeline/requirements-lock.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r fall_risk_pipeline/requirements-dev-lock.txt

      - name: Run pipeline unit tests
        working-directory: fall_risk_pipeline
        run: pytest tests/ -q --tb=short

      - name: Run API unit tests
        working-directory: api
        run: pytest tests/ -q --tb=short
